name: CI - Quality + Playwright
 
on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  workflow_dispatch:
 
permissions:
  contents: read
 
jobs:
  quality:
    name: Quality / ESLint + HTML + CSS
    runs-on: ubuntu-latest
    timeout-minutes: 15
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
 
      - name: Install dependencies
        run: npm ci
 
      - name: Run quality checks
        run: npm run quality
 
  e2e:
    name: E2E / Playwright Chromium
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 60
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
 
      - name: Install dependencies
        run: npm ci
 
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
 
      - name: Run Playwright tests
        run: npm run test:ci
 
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
